version: '3.8'

services:
  app:
    build: .
    container_name: apple-order-mgr
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=apple_order_mgr
      - DB_USER=apple_user
      - DB_PASSWORD=AppleOrder2024!
      - JWT_SECRET=AppleOrderJWTSecret2024SecureKey!
      - LOG_LEVEL=info
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
